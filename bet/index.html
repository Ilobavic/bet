<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered football match picks for Sportybet Nigeria. Smart accumulator, over/under, and mixed bet recommendations." />
    <meta name="theme-color" content="#05f07a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PickAI" />

    <!-- Open Graph -->
    <meta property="og:title" content="PickAI — Smart Match Recommendations" />
    <meta property="og:description" content="AI-powered football betting picks for Sportybet Nigeria users." />
    <meta property="og:type" content="website" />

    <title>PickAI — Smart Match Recommendations</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <!-- Header -->
      <header role="banner">
        <div>
          <div class="brand">
            <span class="brand-name" aria-label="PickAI">PickAI</span>
          </div>
          <div class="brand-sub">
            Sportybet Match Intelligence · You Place, You Decide
          </div>
        </div>
        <div class="live-dot" role="status" aria-live="polite">AI ANALYST READY</div>
      </header>

      <!-- Filter bar -->
      <section class="filterbar" aria-label="Pick settings">
        <div class="fg">
          <label for="betType">Bet Type</label>
          <div class="select-wrap">
            <select id="betType" aria-label="Select bet type">
              <option value="accumulator">Accumulator</option>
              <option value="overunder">Over / Under</option>
              <option value="mixed" selected>Mixed</option>
            </select>
          </div>
        </div>
        <div class="fg">
          <label for="count">Matches</label>
          <div class="select-wrap">
            <select id="count" aria-label="Number of picks">
              <option value="3">3 Picks</option>
              <option value="4" selected>4 Picks</option>
              <option value="5">5 Picks</option>
              <option value="6">6 Picks</option>
            </select>
          </div>
        </div>
        <div class="fg">
          <label for="risk">Risk Level</label>
          <div class="select-wrap">
            <select id="risk" aria-label="Select risk level">
              <option value="low">Low Risk</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High Reward</option>
            </select>
          </div>
        </div>
        <div class="fg">
          <label for="stake">Stake (₦)</label>
          <input
            type="number"
            id="stake"
            value="1000"
            min="100"
            max="10000000"
            step="100"
            aria-label="Enter stake amount in Naira"
            aria-describedby="stakeError"
          />
          <span id="stakeError" class="input-error-msg" role="alert"></span>
        </div>
        <button class="btn-go" id="goBtn" onclick="analyze()" aria-label="Generate picks">
          GET PICKS →
        </button>
      </section>

      <!-- Loader -->
      <div id="loader" role="status" aria-live="polite" aria-label="Generating picks">
        <div class="loader-ring"></div>
        <div class="loader-label">SCANNING TODAY'S FIXTURES...</div>
        <div class="loader-steps" id="lsteps"></div>
      </div>

      <!-- Empty -->
      <div id="empty" role="main">
        <div class="empty-icon" aria-hidden="true">🎯</div>
        <div class="empty-msg">
          Set your preferences above<br />
          and hit GET PICKS to start
        </div>
      </div>

      <!-- Results -->
      <div id="results" role="region" aria-label="Generated picks" aria-live="polite"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
